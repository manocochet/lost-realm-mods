	"Milk Buckets Cure Effects" = false
	#Should players be able to gain injury effects, such as Bleeding and Broken Bones? Disabling this disables ALL injuries. 
	#This may be better turned false if you have a health mod installed (i.e. First Aid, Legendary Survival Overhaul) so that they don't overlap.
	"Injuries Enabled" = true
